<!doctype html>
<html lang="bg">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Нова транзакция</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body data-page="new_transaction">
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand">KrademBank</div>
      <nav class="nav">
        <a href="/" class="nav-link">Начало</a>
        <a href="/transactions" class="nav-link">Транзакции</a>
        <a href="/new_transaction" class="nav-link active">Нова транзакция</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Създаване на нова транзакция</h2>

      <form id="tx-form" class="form">
        <label for="iban-sender">IBAN на наредителя</label>
        <input id="iban-sender" maxlength="22" placeholder="IBAN на наредителя" />

        <label for="iban-receiver">IBAN на получателя</label>
        <input id="iban-receiver" maxlength="22" placeholder="IBAN на получателя" />

        <label for="amount">Сума</label>
        <input id="amount" type="number" step="0.01" min="0.01" placeholder="0.00" />

        <label for="currency">Валута</label>
        <select id="currency">
          <option value="EUR">EUR</option>
          <option value="USD">USD</option>
        </select>

        <label for="reason">Основание (по желание)</label>
        <input id="reason" placeholder="Причина за плащането" />

        <div class="row">
          <button class="button">Изпрати</button>
          <button type="button" id="reset-btn" class="button outline">Нулирай</button>
        </div>
      </form>

      <div id="tx-alerts"></div>
    </section>
  </main>

  <script>window.BANK_CODE = "{{ BANK_CODE }}";</script>
  <script type="module" src="{{ url_for('static', filename='js/new_transaction.js') }}"></script>
</body>

</html>
