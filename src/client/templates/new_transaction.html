<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Нов превод</title>
</head>
<body>
<h2>Създай нов превод</h2>
<form id="transactionForm">
    IBAN наредител: <input type="text" id="sender"><br>
    IBAN получател: <input type="text" id="receiver"><br>
    Сума: <input type="number" step="0.01" id="amount"><br>
    Валута: 
    <select id="currency">
        <option value="EUR">EUR</option>
        <option value="USD">USD</option>
    </select><br>
    Основание: <input type="text" id="reason"><br>
    <button type="submit">Изпрати</button>
</form>

<pre id="result"></pre>

<script>
document.getElementById("transactionForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const data = {
        IBAN_sender: document.getElementById("sender").value,
        IBAN_receiver: document.getElementById("receiver").value,
        amount: parseFloat(document.getElementById("amount").value),
        currency: document.getElementById("currency").value,
        reason: document.getElementById("reason").value
    };

    const response = await fetch("/KDBbankAPI/transactions/", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const result = await response.json();
    document.getElementById("result").innerText = JSON.stringify(result, null, 2);
});
</script>
</body>
</html>
