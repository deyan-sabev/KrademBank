<!doctype html>
<html lang="bg">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Търсене на транзакции</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body data-page="transactions">
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand">KrademBank</div>
      <nav class="nav">
        <a href="/" class="nav-link">Начало</a>
        <a href="/transactions" class="nav-link active">Транзакции</a>
        <a href="/new_transaction" class="nav-link">Нова транзакция</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Търсене на транзакции по IBAN</h2>

      <form id="search-form" class="form">
        <label for="search-iban">IBAN</label>
        <input id="search-iban" placeholder="Въведи IBAN (само букви и цифри, макс 22 символа)" />
        <div class="row">
          <button class="button">Търси</button>
          <button type="button" id="clear-btn" class="button outline">Изчисти</button>
        </div>
      </form>

      <div id="alerts"></div>

      <div id="results-wrap" class="card compact hidden">
        <h3>Резултати</h3>
        <div id="results"></div>
      </div>
    </section>
  </main>

  <script>window.BANK_CODE = "{{ BANK_CODE }}";</script>
  <script type="module" src="{{ url_for('static', filename='js/transactions.js') }}"></script>
</body>

</html>
